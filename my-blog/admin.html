<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Admin - Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1a1a1a; padding: 20px; border-radius: 12px; }
        input, textarea { width: 100%; background: #222; border: 1px solid #333; color: white; padding: 12px; margin-bottom: 10px; border-radius: 6px; }
        .btn-main { width: 100%; padding: 15px; background: white; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .post-item { background: #222; padding: 10px; margin-top: 10px; border-radius: 6px; display: flex; justify-content: space-between; }
        /* 强制编辑器深色 */
        .EasyMDEContainer, .CodeMirror { background: #222 !important; color: white !important; }
        .editor-toolbar { background: #333 !important; }
        .editor-toolbar button { color: white !important; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="title-tag">发布新文章</h2>
        <input type="password" id="pw" placeholder="管理密码">
        <input type="text" id="title" placeholder="文章标题">
        <textarea id="editor"></textarea>
        <button class="btn-main" onclick="submit()">提交保存</button>
        <button id="cancel-btn" style="display:none; margin-top:10px; background:none; color:grey; border:none; cursor:pointer;" onclick="location.reload()">取消修改</button>

        <div style="margin-top:40px;">
            <h3>文章管理</h3>
            <div id="list">加载中...</div>
        </div>
    </div>

    <script>
        let currentId = null;
        const mde = new EasyMDE({ element: document.getElementById("editor"), spellChecker: false });

        async function submit() {
            const payload = {
                password: document.getElementById('pw').value,
                title: document.getElementById('title').value,
                content: mde.value(),
                action: currentId ? 'update' : 'create',
                id: currentId
            };
            const res = await fetch('/manage', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            if (res.ok) { alert('成功'); location.reload(); } else { alert('失败'); }
        }

        async function loadList() {
            const res = await fetch('/manage');
            const data = await res.json();
            document.getElementById('list').innerHTML = data.map(p => `
                <div class="post-item">
                    <span>${p.title}</span>
                    <div>
                        <button onclick="editPost(${p.id})">修改</button>
                        <button onclick="deletePost(${p.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        async function editPost(id) {
            const res = await fetch(`/posts?id=${id}`);
            const p = await res.json();
            currentId = id;
            document.getElementById('title').value = p.title;
            mde.value(p.content);
            document.getElementById('title-tag').innerText = "正在修改文章";
            document.getElementById('cancel-btn').style.display = "block";
            window.scrollTo(0,0);
        }

        async function deletePost(id) {
            const pw = document.getElementById('pw').value;
            if(!pw || !confirm('确定删除?')) return;
            await fetch('/manage', {
                method: 'POST',
                body: JSON.stringify({ password: pw, action: 'delete', id })
            });
            loadList();
        }
        loadList();
    </script>
</body>
</html>
