<script>
    var simplemde = new SimpleMDE({ 
        element: document.getElementById("md-editor"), 
        spellChecker: false,
        renderingConfig: { singleLineBreaks: true } 
    });

    let currentEditId = null; // 记录当前是否在修改文章

    async function publishPost() {
        const password = document.getElementById('admin-pw').value;
        const title = document.getElementById('post-list-title').value; // 假设标题 input id
        const content = simplemde.value();
        
        if (!password || !title || !content) return alert('请填全内容');

        const payload = { 
            password, 
            title, 
            content,
            id: currentEditId // 如果有值，后端会执行更新
        };

        try {
            const res = await fetch('/manage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) { 
                alert(currentEditId ? '更新成功！' : '发布成功！'); 
                location.reload(); 
            } else { 
                alert('操作失败'); 
            }
        } catch (e) { alert('网络错误'); }
    }

    // 【新增】进入编辑模式
    async function editPost(id, title) {
        currentEditId = id;
        document.getElementById('post-list-title').value = title;
        
        // 从 API 获取该文章的原文内容
        const res = await fetch(`/posts?id=${id}`);
        const post = await res.json();
        simplemde.value(post.content);
        
        // 滚动回顶部并提示
        window.scrollTo(0, 0);
        document.querySelector('h2').innerText = "正在修改文章：" + title;
        document.querySelector('.btn-pub').innerText = "保存修改";
    }

    async function loadPosts() {
        const res = await fetch('/manage');
        const posts = await res.json();
        document.getElementById('manage-list').innerHTML = posts.map(p => `
            <div class="post-item" style="display:flex; justify-content:space-between; margin-bottom:10px; background:#222; padding:10px; border-radius:15px;">
                <span>${p.title}</span>
                <div>
                    <button onclick="editPost(${p.id}, '${p.title}')" style="margin-right:10px; cursor:pointer;">编辑</button>
                    <button class="btn-del" onclick="deletePost(${p.id})">删除</button>
                </div>
            </div>
        `).join('');
    }
    loadPosts();
</script>
