<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fris's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+SC:wght@300&display=swap" rel="stylesheet">
    <style>
        /* 核心布局：背景固定不动，内容随页面滚动 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #111; 
            font-family: 'Noto Sans SC', sans-serif;
            color: white;
            overflow-x: hidden;
            overflow-y: auto; 
        }

        /* 固定的背景容器 */
        #bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-position: center;
            background-size: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* 首页全屏 Title 区域 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 10vw, 4.5rem);
            letter-spacing: 0.15em;
            cursor: pointer;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #typewriter {
            margin-top: 15px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            min-height: 1.5em;
        }

        /* 博客文章列表区域 */
        .blog-section {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 50px 20px 100px 20px;
            position: relative;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .post-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.1);
        }

        .post-card h2 { font-size: 1.8rem; margin-bottom: 15px; font-weight: 400; }
        .post-card p { font-size: 1rem; color: rgba(255, 255, 255, 0.7); line-height: 1.8; }
        .post-meta { margin-top: 20px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.4); }

        /* 右下角固定标签 */
        #location-tag {
            position: fixed;
            right: 30px; bottom: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            z-index: 10;
            opacity: 0;
            transition: opacity 2s;
        }
    </style>
</head>
<body>

    <div id="bg-fixed"></div>
    <div class="overlay"></div>
    <div id="location-tag"></div>

    <div class="container">
        <section class="hero">
            <h1 onclick="location.reload()">Fris's Page</h1>
            <div id="typewriter"><span id="text"></span></div>
        </section>

        <main class="blog-section" id="post-list">
            <div style="text-align: center; opacity: 0.5;">Loading posts...</div>
        </main>
    </div>

    <script>
        const CONFIG = { pcCount: 24, mobileCount: 4, basePath: 'images/', extension: '.webp' };
        
        // 你的真实位置数据
        const locationData = {
            pc: {
                "1": "京都　龍安寺", "2": "関西", "3": "忍野八海", "4": "渋谷",
                "5": "東京都庁", "6": " 广州 孙中山纪念堂", "7": "皇居　富士見櫓", "8": "大手町",
                "9": "東京駅", "10": "大阪　茶屋町　美津濃", "11": "心斎橋", "12": "甲子園球場",
                "13": "Bangkok", "14": "Bangkok", "15": "明治神宮", "16": "京都御苑",
                "17": "京都御苑", "18": "東京都庁", "19": "新宿", "20": "増上寺",
                "21": "日本橋", "22": "東京都庁", "23": "新宿御苑", "24": "新宿御苑"
            },
            mobile: {
                "1": "河口湖", "2": "東京タワー", "3": "東京タワー", "4": "日本橋"
            }
        };

        function initBg() {
            const bg = document.getElementById('bg-fixed');
            const tag = document.getElementById('location-tag');
            const isMobile = window.innerWidth <= 768;
            const type = isMobile ? 'mobile' : 'pc';
            const count = isMobile ? CONFIG.mobileCount : CONFIG.pcCount;
            const num = Math.floor(Math.random() * count) + 1;
            const src = `${CONFIG.basePath}${type}/${num}${CONFIG.extension}`;
            
            const img = new Image();
            img.src = src;
            img.onload = () => {
                bg.style.backgroundImage = `url('${src}')`;
                bg.style.opacity = '1';
                // 仅当对应编号有地名时显示
                if (locationData[type] && locationData[type][num]) {
                    tag.innerText = locationData[type][num];
                    tag.style.opacity = '1';
                } else {
                    tag.style.opacity = '0';
                }
            };
        }

        let charIndex = 0;
        const typeText = "Currently nothing's here";
        function typeWriter() {
            const textElement = document.getElementById('text');
            if (textElement && charIndex < typeText.length) {
                textElement.innerHTML += typeText.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 100);
            }
        }

        async function fetchPosts() {
            try {
                // 对接你之前绑定的 D1 /api/posts 接口
                const response = await fetch('/api/posts');
                const posts = await response.json();
                const listHtml = posts.map(post => `
                    <article class="post-card">
                        <h2>${post.title}</h2>
                        <p>${post.excerpt || (post.content ? post.content.substring(0, 100) + '...' : '...')}</p>
                        <div class="post-meta">${post.date || ''}</div>
                    </article>
                `).join('');
                document.getElementById('post-list').innerHTML = listHtml;
            } catch (err) {
                document.getElementById('post-list').innerHTML = `<p style="text-align:center; opacity:0.5;">暂时无法加载文章</p>`;
            }
        }

        window.onload = () => {
            initBg();
            setTimeout(typeWriter, 1000);
            fetchPosts();
        };
    </script>
</body>
</html>
