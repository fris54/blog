<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fris's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+SC:wght@300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; font-family: 'Noto Sans SC', sans-serif; color: white; overflow-x: hidden; }
        #bg-fixed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background-size: cover; opacity: 0; transition: opacity 1.5s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: -1; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 8vw, 4rem); cursor: pointer; }
        .blog-section { width: 90%; max-width: 800px; margin: 0 auto; padding-bottom: 100px; }
        .post-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; padding: 30px; margin-bottom: 30px; cursor: pointer; transition: 0.3s; }
        .post-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }
        #detail-view { display: none; padding-top: 50px; }
        .markdown-body { line-height: 1.8; opacity: 0.9; }
        #location-tag { position: fixed; right: 20px; bottom: 20px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>
    <div id="bg-fixed"></div>
    <div class="overlay"></div>
    <div id="location-tag"></div>

    <div id="list-ui">
        <section class="hero">
            <h1 onclick="location.reload()">Fris's Page</h1>
            <div id="typewriter" style="margin-top:10px; opacity:0.7;">Currently nothing's here</div>
        </section>
        <main class="blog-section" id="post-list"></main>
    </div>

    <div id="detail-view" class="blog-section">
        <div onclick="showList()" style="cursor:pointer; margin-bottom:30px; opacity:0.5;">← Back</div>
        <div id="detail-content" class="markdown-body"></div>
    </div>

    <script>
        async function fetchPosts() {
            try {
                const res = await fetch('/posts');
                const posts = await res.json();
                document.getElementById('post-list').innerHTML = posts.map(p => `
                    <article class="post-card" onclick="showDetail(${p.id})">
                        <h2>${p.title}</h2>
                        <p style="margin-top:10px; opacity:0.6;">${p.content.substring(0,60)}...</p>
                        <div style="margin-top:15px; font-size:0.8rem; opacity:0.3;">${p.date || ''}</div>
                    </article>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function showDetail(id) {
            try {
                const res = await fetch(`/posts?id=${id}`);
                const post = await res.json();
                document.getElementById('list-ui').style.display = 'none';
                document.getElementById('detail-view').style.display = 'block';
                const contentEl = document.getElementById('detail-content');
                contentEl.innerHTML = `<h1>${post.title}</h1><hr style="margin:20px 0; opacity:0.1;"><div>${marked.parse(post.content)}</div>`;
                contentEl.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                window.scrollTo(0,0);
            } catch (e) { alert("文章加载失败"); }
        }

        function showList() {
            document.getElementById('list-ui').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
        }

        // 背景图随机逻辑 (简化版)
        window.onload = () => {
            const bg = document.getElementById('bg-fixed');
            bg.style.backgroundImage = `url('images/pc/${Math.floor(Math.random()*24)+1}.webp')`;
            bg.style.opacity = '1';
            fetchPosts();
        };
    </script>
</body>
</html>
