<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fris's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+SC:wght@300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; font-family: 'Noto Sans SC', sans-serif; color: white; overflow-x: hidden; }
        #bg-fixed { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.25); z-index: -1; }
        .squircle { border-radius: 35px; }
        .blog-section { width: 90%; max-width: 800px; margin: 0 auto; padding-bottom: 100px; position: relative; z-index: 1; }
        .glass-panel { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); }
        .post-card { display: block; text-decoration: none; color: inherit; padding: 30px; margin-bottom: 25px; transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), background 0.3s; }
        .post-card:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.12); }
        #detail-view { display: none; padding-top: 60px; min-height: 100vh; }
        .detail-card { padding: 45px; margin-top: 20px; }
        .markdown-body { line-height: 1.8; color: rgba(255, 255, 255, 0.9); font-size: 1.05rem; }
        .markdown-body h1 { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-weight: 400; }

        /* --- 代码框强力样式 --- */
        .markdown-body pre { 
            background: #0d1117 !important; 
            padding: 20px !important; 
            border-radius: 15px !important; 
            overflow: auto !important; 
            margin: 24px 0 !important; 
            position: relative !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
        }
        .markdown-body code { font-family: 'Consolas', monospace; font-size: 0.95em; background: transparent; }

        /* --- 复制按钮样式 --- */
        .copy-btn {
            position: absolute; top: 10px; right: 10px;
            padding: 5px 12px; background: rgba(255,255,255,0.1);
            color: #fff; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; cursor: pointer; font-size: 12px;
            opacity: 0; transition: 0.3s; z-index: 100;
        }
        .markdown-body pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: #fff; color: #000; }

        .back-btn { cursor:pointer; margin-bottom:20px; opacity:0.6; display:inline-flex; align-items: center; transition: 0.3s; color: white; text-decoration: none; }
        #location-tag { position: fixed; right: 30px; bottom: 30px; font-size: 0.8rem; opacity: 0; transition: opacity 1s; color: rgba(255,255,255,0.6); z-index: 10; letter-spacing: 1px; }
        #typewriter { margin-top:15px; opacity:0.5; font-weight:300; min-height: 1.2em; white-space: pre; }
    </style>
</head>
<body>
    <div id="bg-fixed"></div>
    <div class="overlay"></div>
    <div id="location-tag"></div>

    <div id="list-ui">
        <section style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <h1 style="font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 4.5rem); cursor: pointer;" onclick="location.href='/'">Fris's Page</h1>
            <div id="typewriter"></div>
        </section>
        <main class="blog-section" id="post-list"></main>
    </div>

    <div id="detail-view" class="blog-section">
        <a href="/" class="back-btn" id="global-back-btn">← Back</a>
        <div class="detail-card glass-panel squircle">
            <div id="detail-content" class="markdown-body"></div>
        </div>
    </div>

    <script>
        const locationData = { pc: { "1": "京都　龍安寺", "2": "関西", "3": "忍野八海", "4": "渋谷", "5": "東京都庁", "6": "广州", "7": "皇居", "8": "大手町", "9": "東京駅", "10": "大阪", "11": "心斎橋", "12": "甲子園", "13": "Bangkok", "14": "Bangkok", "15": "明治神宫", "16": "京都御苑", "17": "京都御苑", "18": "東京都庁", "19": "新宿", "20": "增上寺", "21": "日本桥", "22": "東京都庁", "23": "新宿御苑", "24": "新宿御苑" }, mobile: { "1": "河口湖", "2": "東京タワー", "3": "東京タワー", "4": "日本桥" } };

        function initScene() {
            const bg = document.getElementById('bg-fixed');
            const tag = document.getElementById('location-tag');
            const isMobile = window.innerWidth <= 768;
            const type = isMobile ? 'mobile' : 'pc';
            const num = Math.floor(Math.random() * (isMobile ? 4 : 24)) + 1;
            const src = `images/${type}/${num}.webp`;
            const img = new Image();
            img.src = src;
            img.onload = () => {
                bg.style.backgroundImage = `url('${src}')`;
                bg.style.opacity = '1';
                if (locationData[type][num]) { tag.innerText = locationData[type][num]; tag.style.opacity = '1'; }
            };
        }

        function runTypewriter() {
            const el = document.getElementById('typewriter');
            if (!el) return;
            const text = "personal website started in 2023";
            let i = 0; el.textContent = ""; 
            function type() { if (i < text.length) { el.textContent += text.charAt(i); i++; setTimeout(type, 100); } }
            type();
        }

        async function fetchPosts() {
            try {
                const res = await fetch('/posts');
                const posts = await res.json();
                document.getElementById('post-list').innerHTML = posts.map(p => `
                    <a href="?id=${p.id}" class="post-card glass-panel squircle" onclick="event.preventDefault(); loadArticle(${p.id})">
                        <h2>${p.title}</h2>
                        <p style="opacity:0.6; font-size:0.95rem;">${p.content.substring(0,80).replace(/[#*`>-]/g,'')}...</p>
                    </a>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function loadArticle(id, pushState = true) {
            try {
                const res = await fetch(`/posts?id=${id}`);
                const post = await res.json();
                document.getElementById('list-ui').style.display = 'none';
                document.getElementById('detail-view').style.display = 'block';
                
                const contentEl = document.getElementById('detail-content');
                contentEl.innerHTML = `<h1>${post.title}</h1><div id="post-body">${marked.parse(post.content)}</div>`;

                // 强制处理代码块
                document.querySelectorAll('#post-body pre').forEach(pre => {
                    const code = pre.querySelector('code');
                    if (code) {
                        hljs.highlightElement(code);
                        if (!pre.querySelector('.copy-btn')) {
                            const btn = document.createElement('button');
                            btn.className = 'copy-btn';
                            btn.innerText = 'Copy';
                            pre.appendChild(btn);
                            btn.onclick = () => {
                                navigator.clipboard.writeText(code.innerText).then(() => {
                                    btn.innerText = 'Copied!';
                                    setTimeout(() => btn.innerText = 'Copy', 2000);
                                });
                            };
                        }
                    }
                });
                window.scrollTo(0,0);
                if (pushState) history.pushState({id}, '', `?id=${id}`);
            } catch (e) { console.error(e); }
        }

        function showList(pushState = true) {
            document.getElementById('list-ui').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            if (pushState) history.pushState({}, '', window.location.pathname);
            fetchPosts(); // 核心修复：回来时重新抓取列表
            runTypewriter();
        }

        // 统一处理后退/前进
        window.onpopstate = (e) => {
            const id = new URLSearchParams(window.location.search).get('id');
            if (id) {
                loadArticle(id, false);
            } else {
                showList(false);
            }
        };

        document.getElementById('global-back-btn').onclick = (e) => {
            e.preventDefault();
            showList();
        };

        window.onload = () => {
            initScene();
            const id = new URLSearchParams(window.location.search).get('id');
            if (id) loadArticle(id, false); else showList(false);
        };
    </script>
</body>
</html>
