<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fris's Blog</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; color: white; font-family: sans-serif; line-height: 1.6; }
        .blog-section { width: 90%; max-width: 800px; margin: 0 auto; padding: 50px 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; }
        
        /* --- 换行精准修复核心 CSS --- */
        .markdown-body { 
            white-space: pre-wrap; /* 保留所有换行符和空格 */
            word-wrap: break-word;
            font-size: 1rem;
            color: #ddd;
        }
        .markdown-body p { 
            margin: 0; /* 去掉段落边距，让换行完全由编辑器里的回车控制 */
        }
        .markdown-body h1, .markdown-body h2 { margin-top: 20px; margin-bottom: 10px; }
        
        /* 代码块显示修复 */
        .markdown-body pre { 
            background: #0d1117 !important; 
            padding: 16px !important; 
            border-radius: 8px !important; 
            white-space: pre !important; /* 代码块内部不需要 pre-wrap，防止代码乱换行 */
            overflow-x: auto;
            margin: 15px 0;
        }
        .markdown-body code { font-family: monospace; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }
        /* --- 修复结束 --- */

        .post-card { display: block; padding: 20px; margin-bottom: 20px; text-decoration: none; color: inherit; transition: 0.3s; }
        .post-card:hover { background: rgba(255,255,255,0.1); }
        .back-btn { cursor: pointer; opacity: 0.6; display: inline-block; margin-bottom: 20px; color: white; text-decoration: none; }
    </style>
</head>
<body>
    <div id="list-ui" class="blog-section">
        <h1 style="text-align:center; margin-bottom:40px;">Fris's Blog</h1>
        <div id="post-list"></div>
    </div>

    <div id="detail-view" class="blog-section" style="display:none;">
        <a href="#" class="back-btn" onclick="showList()">← Back</a>
        <div class="glass-panel">
            <div id="detail-content" class="markdown-body"></div>
        </div>
    </div>

    <script>
        // 配置 Marked
        marked.setOptions({
            breaks: true, // 允许单回车换行
            gfm: true
        });

        async function fetchPosts() {
            const res = await fetch('/posts');
            const posts = await res.json();
            document.getElementById('post-list').innerHTML = posts.map(p => `
                <a href="?id=${p.id}" class="post-card glass-panel" onclick="event.preventDefault(); loadArticle(${p.id})">
                    <h2>${p.title}</h2>
                    <div style="opacity:0.4; font-size:0.8rem;">${p.date || ''}</div>
                </a>
            `).join('');
        }

        async function loadArticle(id, pushState = true) {
            const res = await fetch(`/posts?id=${id}`);
            const post = await res.json();
            
            document.getElementById('list-ui').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            
            const contentEl = document.getElementById('detail-content');
            contentEl.innerHTML = `<h1>${post.title}</h1><div>${marked.parse(post.content)}</div>`;

            // 代码高亮
            document.querySelectorAll('pre code').forEach((el) => {
                hljs.highlightElement(el);
            });

            if (pushState) history.pushState({id}, '', `?id=${id}`);
            window.scrollTo(0,0);
        }

        function showList() {
            document.getElementById('list-ui').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            history.pushState({}, '', window.location.pathname);
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            id ? loadArticle(id, false) : fetchPosts();
        };
    </script>
</body>
</html>
